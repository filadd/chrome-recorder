AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: filadd-chrome-recorder — upload signer + event-driven transcription pipeline (Hono on Lambda)

Parameters:
  ApiToken:
    Type: String
    NoEcho: true
    Description: "Shared bearer token the extension must send (Authorization: Bearer <token>)"
  AllowedOrigins:
    Type: String
    Description: Comma-separated allowed origins, e.g. chrome-extension://hokpbkbpbggoeibolomknakfccmgoeae
  ExtensionOrigin:
    Type: String
    Default: chrome-extension://hokpbkbpbggoeibolomknakfccmgoeae
    Description: The extension origin allowed to PUT parts directly to the bucket (bucket CORS)
  RecordingsBucketName:
    Type: String
    Default: filadd-chrome-recorder
    Description: Transient recordings bucket — created and managed by this stack (must be a free global name)
  BucketRegion:
    Type: String
    Default: sa-east-1
    Description: Region the bucket lives in. Deploy this whole stack here so S3→Lambda events fire.
  PipelineSecretArn:
    Type: String
    Description: Secrets Manager ARN of the JSON secret { deepgramApiKey, callbackToken, llmApiKey, notionApiKey }
  LlmBaseUrl:
    Type: String
    Description: OpenAI-compatible base URL for the labeling/summary LLM (provider-agnostic)
  LlmModel:
    Type: String
    Description: Model id for the labeling/summary LLM
  ReviewStaleDays:
    Type: Number
    Default: 7
    Description: Sweeper backstop — best-guess finalize reviews left unreviewed this many days

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 30
    MemorySize: 256

Resources:
  # Transient recordings bucket, created and owned by this stack. SAM wires the
  # ObjectCreated → IngestFunction notification (don't hand-write it here, or the
  # bucket↔function circular dependency returns). DeletionPolicy Retain so a stack
  # delete never drops recordings or fails on a non-empty bucket.
  RecordingsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref RecordingsBucketName
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref ExtensionOrigin
            AllowedMethods:
              - PUT
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
      LifecycleConfiguration:
        Rules:
          - Id: abort-incomplete-mpu
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          # Audio is transient: expire raw recordings fast. Review artifacts live
          # under a separate prefix with a longer backstop so a pending review
          # isn't force-deleted mid-window (the sweeper finalizes before then).
          - Id: expire-staged-audio
            Status: Enabled
            Prefix: projects/
            ExpirationInDays: 3
          - Id: expire-reviews
            Status: Enabled
            Prefix: reviews/
            ExpirationInDays: 30

  UploadApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/lambda.ts
        Target: node20
        Sourcemap: false
        Minify: false
    Properties:
      Handler: lambda.handler
      CodeUri: .
      Description: Issues presigned multipart URLs and runs control-plane S3 calls
      Environment:
        Variables:
          API_TOKEN: !Ref ApiToken
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          S3_REGION: !Ref BucketRegion
          S3_BUCKET_PROJECT: !Ref RecordingsBucketName
          FINALIZE_FUNCTION_NAME: !Ref FinalizeFunction
      # No static AWS keys: the execution role below is the only credential, scoped
      # to the multipart actions on the recordings bucket. Presigned part URLs are
      # signed with these role credentials, so the role must allow what the browser
      # will later PUT (s3:PutObject).
      Policies:
        - Statement:
            - Sid: MultipartOnBucket
              Effect: Allow
              Action:
                - s3:PutObject
                - s3:AbortMultipartUpload
                - s3:ListMultipartUploadParts
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}/*
            # Review queue: list the user's pending reviews and read one artifact.
            - Sid: ReadReviewArtifacts
              Effect: Allow
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}/reviews/*
            - Sid: ListReviewArtifacts
              Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}
              Condition:
                StringLike:
                  s3:prefix: reviews/*
            # Submitting a review async-invokes the heavy Finalize lambda.
            - Sid: InvokeFinalize
              Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt FinalizeFunction.Arn
      # CORS is handled in-app (Hono, origin allowlist from ALLOWED_ORIGINS) so the
      # behavior is identical locally and on Lambda; the Function URL only provides
      # the HTTPS endpoint. Auth is NONE here — the app does its own bearer check.
      FunctionUrlConfig:
        AuthType: NONE

  # Dead-letter queue for ingest async-invocation failures (the only retryable
  # piece without a poller — the callback's "retry" is Deepgram re-POSTing).
  IngestDlq:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600 # 14 days

  # Fired by S3 ObjectCreated (projects/*.webm). Presigns a GET, submits it to
  # Deepgram async with a callback, tags the object submitted. Fast/sub-second.
  IngestFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/ingest.ts
        Target: node20
        Sourcemap: false
        Minify: false
    Properties:
      Handler: ingest.handler
      CodeUri: .
      Description: S3 ObjectCreated → submit the recording to Deepgram (async callback)
      Environment:
        Variables:
          S3_REGION: !Ref BucketRegion
          PIPELINE_SECRET_ARN: !Ref PipelineSecretArn
          CALLBACK_URL: !GetAtt CallbackFunctionUrl.FunctionUrl
          PRESIGN_GET_EXPIRES_SECONDS: "3600"
      EventInvokeConfig:
        MaximumRetryAttempts: 2
        DestinationConfig:
          OnFailure:
            Type: SQS
            Destination: !GetAtt IngestDlq.Arn
      Events:
        AudioUploaded:
          Type: S3
          Properties:
            Bucket: !Ref RecordingsBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: projects/
                  - Name: suffix
                    Value: .webm
      Policies:
        - Statement:
            - Sid: ReadAndTagObjects
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:GetObjectTagging
                - s3:PutObjectTagging
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}/*
            - Sid: ReadPipelineSecret
              Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref PipelineSecretArn
            - Sid: SendToDlq
              Effect: Allow
              Action: sqs:SendMessage
              Resource: !GetAtt IngestDlq.Arn

  # Deepgram POSTs the transcript here. Validates the shared-secret token, formats
  # the diarized transcript, runs the cheap speaker-name guess, writes the review
  # artifact (reviews/*.json), then deletes the audio. The heavy summary/context +
  # Notion work is deferred to FinalizeFunction once a human confirms the names.
  CallbackFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/callback.ts
        Target: node20
        Sourcemap: false
        Minify: false
    Properties:
      Handler: callback.handler
      CodeUri: .
      Description: Deepgram callback → format, guess names, write review artifact, delete audio
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          S3_REGION: !Ref BucketRegion
          S3_BUCKET_PROJECT: !Ref RecordingsBucketName
          PIPELINE_SECRET_ARN: !Ref PipelineSecretArn
          LLM_BASE_URL: !Ref LlmBaseUrl
          LLM_MODEL: !Ref LlmModel
      Policies:
        - Statement:
            # Reads/tags/deletes the audio object and writes the review artifact.
            - Sid: ReadTagWriteDeleteObjects
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:GetObjectTagging
                - s3:PutObjectTagging
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}/*
            - Sid: ReadPipelineSecret
              Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref PipelineSecretArn
      FunctionUrlConfig:
        AuthType: NONE

  # Invoked (async, "Event") by the upload API when a human submits speaker names,
  # or in-process by the sweeper with best-guess labels. Applies the naming, runs
  # the summary/context LLM pass, writes Notion, and deletes the review artifact.
  FinalizeFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/finalize.ts
        Target: node20
        Sourcemap: false
        Minify: false
    Properties:
      Handler: finalize.handler
      CodeUri: .
      Description: Apply speaker naming → summary/context LLM → Notion → delete the review artifact
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          S3_REGION: !Ref BucketRegion
          S3_BUCKET_PROJECT: !Ref RecordingsBucketName
          PIPELINE_SECRET_ARN: !Ref PipelineSecretArn
          LLM_BASE_URL: !Ref LlmBaseUrl
          LLM_MODEL: !Ref LlmModel
      Policies:
        - Statement:
            - Sid: ReadDeleteReviewArtifacts
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}/reviews/*
            - Sid: ReadPipelineSecret
              Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref PipelineSecretArn

  # Daily backstop: best-guess-finalizes review artifacts left unreviewed past
  # REVIEW_STALE_DAYS, so a forgotten review still reaches Notion and the queue
  # self-cleans. Runs the finalize logic in-process (hence the same IAM + secrets).
  SweeperFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/sweeper.ts
        Target: node20
        Sourcemap: false
        Minify: false
    Properties:
      Handler: sweeper.handler
      CodeUri: .
      Description: Daily best-guess finalize for reviews older than REVIEW_STALE_DAYS
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          S3_REGION: !Ref BucketRegion
          S3_BUCKET_PROJECT: !Ref RecordingsBucketName
          PIPELINE_SECRET_ARN: !Ref PipelineSecretArn
          LLM_BASE_URL: !Ref LlmBaseUrl
          LLM_MODEL: !Ref LlmModel
          REVIEW_STALE_DAYS: !Ref ReviewStaleDays
      Events:
        DailySweep:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
      Policies:
        - Statement:
            - Sid: ListReviewArtifacts
              Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}
              Condition:
                StringLike:
                  s3:prefix: reviews/*
            - Sid: ReadDeleteReviewArtifacts
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${RecordingsBucketName}/reviews/*
            - Sid: ReadPipelineSecret
              Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref PipelineSecretArn

Outputs:
  UploadApiUrl:
    Description: Function URL base — set as the extension's API_BASE_URL
    Value: !GetAtt UploadApiFunctionUrl.FunctionUrl
  CallbackUrl:
    Description: Deepgram callback Function URL (the IngestFunction passes it as ?callback=)
    Value: !GetAtt CallbackFunctionUrl.FunctionUrl
